{% load i18n %}
{% load django_bootstrap5 %}
{% bootstrap_css %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sh>
    <title>{% translate "Task manager" %}Hexlet</title>
  </head>

  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <a class="navbar-brand" href="/">{% translate "Task manager" %}</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarToggleExternalContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse ms-1" id="navbarToggleExternalContent">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link ms-1" href="/users/">{% translate "Users" %}</a>
          </li>
        </ul>
        <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="/login/">{% translate "Log in" %}</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/users/create/">{% translate "Registration" %}</a>
            </li>

        </ul>
      </div>
    </nav>

<main class="flex-grow-1">
        {% block main %}
        {% endblock %}
</main>

    <footer>
      <div class="container my-5 pt-4 border-top">
        <a class="p-auto" target="_blank" href="https://ru.hexlet.io">Hexlet</a>
      </div>
    </footer>
  </body>
</html>
